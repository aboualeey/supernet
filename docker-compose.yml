version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vpn_postgres
    restart: always
    environment:
      POSTGRES_USER: vpn_user
      POSTGRES_PASSWORD: vpn_password
      POSTGRES_DB: vpn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Adminer for easy DB management (Optional but helpful)
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # Mock WireGuard Service (for development without Linux privileges)
  # In production, this would be the actual WireGuard container or the host
  wireguard-mock:
    image: alpine:latest
    container_name: wg_mock
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    command: sh -c "mkdir -p /etc/wireguard && touch /etc/wireguard/wg0.conf && tail -f /dev/null"
    volumes:
      - ./wireguard_config:/etc/wireguard

  backend:
    build: ./backend
    command: npm run start:dev
    restart: always
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=vpn_db
      - POSTGRES_USER=vpn_user
      - POSTGRES_PASSWORD=vpn_password
      - JWT_SECRET=super_secret_jwt_key_please_change
      - ENCRYPTION_KEY=super_secret_key_must_be_32_bytes_long!!
      - WIREGUARD_CONFIG_PATH=/etc/wireguard/wg0.conf
      - WIREGUARD_SERVER_PUBLIC_KEY=AQEK26OTn0q+Xg7UjKRfeoI9/TbkcDw9sY96m0Vr/2M=
      - WG_CLIENTS_DIR=/wg_clients
      - NODE_ENV=production
      - WG_PORT=51820
      - WG_DEV_ENDPOINT=192.168.1.25
      - WG_PROD_ENDPOINT=35.226.38.168
      # Remote WireGuard VPS (for TelemetryService & peer management)
      - VPN_REMOTE_HOST=35.226.38.168
      - VPN_REMOTE_USER=ubuntu
      - VPN_SSH_KEY_PATH=/app/google_compute_engine
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./wireguard_config:/etc/wireguard
      - wg_clients_data:/wg_clients

  frontend:
    build: ./frontend
    command: npm run dev
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  wg_clients_data:
